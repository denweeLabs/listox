name: ui_kit
description: "Reusable UI package: theme, widgets, utils, extensions, and snackbar system."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  app_links: ^6.4.1
  flutter_svg: ^2.1.0
  animated_switcher_plus: ^1.4.0
  shimmer_animation: ^2.2.2
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.2
  shared_preferences: ^2.3.0
  animate_do_plus:
    path: ../animate_do_plus/

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/icons/
    - assets/animations/
