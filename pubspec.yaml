name: listox
description: "Predictive recurring household essentials shopping list."
publish_to: 'none'
version: 1.0.2+10

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.1"

dependencies:

  # Flutter
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_crashlytics: ^5.0.7
  firebase_analytics: ^12.1.1

  # Intl
  intl: ^0.20.2

  # Localizations
  easy_localization: ^3.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Database
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.5.40

  # Functional programming
  dartz: ^0.10.1

  # File manager
  path_provider: ^2.1.5
  path: ^1.9.0

  # Dependencies
  json_annotation: ^4.9.0
  get_it: ^9.0.5
  injectable: ^2.6.0
  freezed_annotation: ^3.1.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1

  # Misc
  wakelock_plus: ^1.3.4

  # Animations & UI
  flutter_slidable: ^3.1.1
  # formz: ^0.8.0
  # animated_switcher_plus: ^1.4.0
  # flutter_keyboard_visibility: ^6.0.0
  # animated_flip_counter: ^0.3.4
  flutter_screenutil: ^5.9.3
  tutorial_coach_mark: ^1.3.3
  dotted_border: ^3.1.0
  flutter_inappwebview: ^6.1.5
  animated_reorderable_list: ^1.3.0

  app_core:
    path: packages/app_core/
  ui_kit:
    path: packages/ui_kit/
  subscriptions:
    path: packages/subscriptions/
  animate_do_plus:
    path: packages/animate_do_plus/

dev_dependencies:
  injectable_generator: ^2.9.1
  json_serializable: ^6.11.1
  build_runner: ^2.10.3
  freezed: ^3.2.3
  analyzer: ^8.4.1
  flutter_lints: ^6.0.0
  drift_dev: ^2.29.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:

  assets:
    - assets/icons/
    - assets/icons/groceries/
    - assets/images/
    - assets/translations/
    - assets/animations/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope/Manrope[wght].ttf

    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand/Quicksand[wght].ttf
